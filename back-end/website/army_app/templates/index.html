<!DOCTYPE html>
{% load static %}
<html data-theme="light">
<head>
    <title>My Django App</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet"/>
    <script src="{% static 'js/htmx.min.js' %}"></script>
</head>
<body>

<div class="navbar bg-base-100 shadow-lg px-4">
  <!-- LEFT -->
  <div class="navbar-start">
    <div class="dropdown">
      <label tabindex="0" class="btn btn-ghost btn-circle">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h7"/>
        </svg>
      </label>
      <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-50 mt-3 w-52 p-2 shadow">
        <li><a href="#">Homepage</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </div>
  </div>

  <!-- CENTER -->
  <div class="navbar-center">
    <a class="btn btn-ghost text-xl normal-case">My App</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar-end space-x-2">
    <button class="btn btn-ghost btn-circle">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </button>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="btn btn-square btn-ghost">
      <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2a9.963 9.963 0 00-7.071 2.929A9.963 9.963 0 002 12a9.963 9.963 0 002.929 7.071A9.963 9.963 0 0012 22a9.963 9.963 0 007.071-2.929A9.963 9.963 0 0022 12a9.963 9.963 0 00-2.929-7.071A9.963 9.963 0 0012 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const toggleBtn = document.getElementById('theme-toggle');
  const html = document.documentElement;
  toggleBtn.addEventListener('click', () => {
    html.dataset.theme = html.dataset.theme === 'light' ? 'dark' : 'light';
  });
</script>
